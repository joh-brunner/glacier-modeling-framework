data_assimilation_SR:
  optimization:
    nbitmax: 100 # Max optimizer iterations (also used as the final iteration label in optimize.nc)
  output:
    freq: 200 # Callback + NetCDF write cadence in iterations (iteration 0 is always written)
    vars_to_save: [usurf,thk,icemask,velbase_mag,velsurf_mag,velsurfobs_mag] # 2D fields saved each write; *_mag and sliding_ratio are computed in update_ncdf_optimize when requested
  variables:
  - { name: thk, transform: identity,  lower_bound: 0.0 , upper_bound: 1000.0 , mask: icemask}
  objective:
    misfit:
      - { name: velsurf, kind: gaussian, components: [uvelsurf, vvelsurf], obs: [uvelsurfobs, vvelsurfobs], std: 1.0 }
    regularization:
      - { name: thk, penalty: biharmonic, lam: 100000.0 }